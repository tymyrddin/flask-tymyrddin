        <script type="application/json" id="concepts-data">[{"claim": "All systems are patched on schedule", "failure_mode": "Zero-day exploits target unpatched dependencies that no team claims ownership of", "name": "Patching is regular", "operational_reality": "Patches are staged, delayed, or skipped when they conflict with uptime requirements", "org_incentive": "Patch compliance reports satisfy auditors; actual coverage is never independently verified"}, {"claim": "Centralised logging ensures full visibility across all systems", "failure_mode": "Incidents are reconstructed from fragments; the relevant logs were never collected", "name": "Logs arrive on time", "operational_reality": "Log pipelines drop events under load; timestamps drift; some sources never connected", "org_incentive": "A SIEM deployment counts as logging regardless of what actually reaches it"}, {"claim": "All security decisions have clear ownership and accountability", "failure_mode": "The attack surface that nobody owns is exactly what attackers find first", "name": "Someone owns this decision", "operational_reality": "Cross-team ownership gaps persist indefinitely through escalation chains that resolve nothing", "org_incentive": "RACI matrices document who to blame, not who has the authority or capacity to act"}, {"claim": "Documented procedures ensure consistent and compliant operations", "failure_mode": "The workaround used during the incident was the one nobody trained for", "name": "Processes are followed", "operational_reality": "Under pressure, informal workarounds replace formal procedures and are never documented", "org_incentive": "Process documentation satisfies audits; process adherence is measured by nobody"}, {"claim": "All critical data is backed up according to retention policy", "failure_mode": "The ransomware encrypted the backups first, before anyone verified they were separate", "name": "Backups exist", "operational_reality": "Backup jobs run silently and report success; failure notifications go to a mailbox nobody monitors", "org_incentive": "Backup existence is a compliance checkbox; backup recoverability is an optional exercise"}, {"claim": "All staff have been trained on incident response procedures", "failure_mode": "Staff follow the plan correctly; the plan describes systems that no longer exist", "name": "Staff know the plan", "operational_reality": "Training records are current; the plan itself was last updated before the last two infrastructure migrations", "org_incentive": "Training completion rates are reported to the board; plan accuracy is not"}, {"claim": "Network segmentation limits blast radius across all critical zones", "failure_mode": "Lateral movement succeeded because the segmentation was documented but not deployed", "name": "Network segmentation is enforced", "operational_reality": "Segmentation rules exist in policy; firewall configurations diverged from policy two years ago", "org_incentive": "Network architecture diagrams show clean separation; diagrams are not validated against running config"}, {"claim": "Privileged credentials are rotated on schedule according to policy", "failure_mode": "The compromised credential was three years old and exempt from rotation for compatibility reasons", "name": "Credentials are rotated", "operational_reality": "Service accounts with hardcoded credentials predate the rotation policy and are excluded from it", "org_incentive": "Rotation metrics track managed accounts; unmanaged accounts are not counted"}, {"claim": "Continuous monitoring detects threats across the environment in real time", "failure_mode": "The intrusion dwell time was 47 days because the affected systems were not in scope", "name": "Monitoring is active", "operational_reality": "Monitoring covers the documented environment; shadow IT, legacy systems, and OT are out of scope", "org_incentive": "SOC dashboards show green; scope exclusions are not shown on dashboards"}, {"claim": "Backup integrity is verified through regular restore testing", "failure_mode": "The backup format changed silently; restores from the last six months produce corrupted output", "name": "Backups are tested", "operational_reality": "Restore tests were last completed 14 months ago; the next test is scheduled but not prioritised", "org_incentive": "Backup testing is scheduled annually; the schedule is the compliance artefact, not the result"}, {"claim": "Third-party vendor access is managed through formal access request and review processes", "failure_mode": "The breach originated from a vendor account that had been inactive for eight months", "name": "Vendor access is controlled", "operational_reality": "Vendor accounts persist after contract end because offboarding requires manual cross-team coordination", "org_incentive": "Vendor access reviews are a procurement requirement; operations teams are not in procurement\u0027s chain of command"}, {"claim": "All changes to production systems are approved through the change management process", "failure_mode": "The change that caused the outage was emergency-classified; post-incident review found it was not urgent", "name": "Change management is followed", "operational_reality": "Emergency changes bypass the process; emergency is a classification that teams self-assign", "org_incentive": "Change management reduces liability; the emergency exception exists because uptime pressure exceeds process adherence"}]</script>
