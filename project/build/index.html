        <script type="application/json" id="concepts-data">[{"claim": "All systems are patched on a schedule reviewed quarterly by the Patch Management Committee, subject to operational constraints and Change Advisory Board availability.", "failure_mode": "The March patch was ready on time. The Change Advisory Board met in November. The attackers arrived in October, using the same exploit. Everyone followed the process correctly, including the attacker who read the public CVE.", "impact": "The CEO announced an urgent security transformation. The same consultancy that wrote the schedule was hired to review it. They found the schedule excellent and recommended a new quarterly committee, which met once and then merged into the Change Advisory Board.", "name": "Patching is regular", "operational_reality": "Applying a patch might break the legacy finance system before bonuses are calculated. So the team waits for the Change Advisory Board, then says \u0027further assessment required\u0027 and closes the ticket. The vulnerability remains. The dashboard stays green.", "org_incentive": "The auditor checks whether a patching schedule exists and was reviewed. No auditor has ever asked to see the gap between scheduled and applied patches, because that would mean reading hundreds of deferred tickets. The schedule stays \u0027compliant\u0027 year after year."}, {"claim": "A centralised logging platform provides the Security Operations Centre with comprehensive real-time visibility across the entire estate, including cloud and on-premise.", "failure_mode": "The attacker moved through an acquired subsidiary added after the logging scope froze in 2021. The SOC dashboard showed a beautiful green line, which meant \u0027the platform is receiving electricity\u0027. The attacker had been present for 63 days.", "impact": "After the breach, the SOC manager said the incident was \u0027contained\u0027 within 3 weeks. An internal memo clarified that \u0027contained\u0027 meant \u0027we stopped looking because the forensic budget ran out\u0027. A new logging project was descoped to exclude the subsidiary being sold.", "name": "Logs arrive on time", "operational_reality": "Adding a new log source costs money and takes weeks. Engineers have discovered that \u0027logging locally to a text file\u0027 counts as logging if no one reads the definition closely. They set up a cron job and forget about it until the disk fills.", "org_incentive": "The SIEM renewal form asks for the number of log sources. That number sets the renewal price. No field asks for the percentage of the actual estate that those sources represent. Purchasing approves because the number matches last year\u0027s."}, {"claim": "Security ownership is clearly defined through a RACI framework, reviewed annually and endorsed by the Executive Security Steering Committee.", "failure_mode": "A critical public exploit waited in the ownership queue for 7 months. The RACI named a position made redundant in April. The auto-reply said \u0027contact my former manager\u0027, whose email bounced. The vulnerability was assigned to a shared mailbox with 14,000 unread messages.", "impact": "A cross functional working group met quarterly, produced a new RACI, and was restructured before the RACI could be distributed. The new RACI assigned ownership to a steering group that requires quorum from departments that no longer exist.", "name": "Someone owns this decision", "operational_reality": "The RACI was last updated before a reorganisation that split 3 departments into 5 and merged 2 into one that no longer exists. Staff forward any ownership email to \u0027the person who was here before me\u0027 and mark it \u0027actioned\u0027.", "org_incentive": "The RACI is a governance artefact that auditors photograph during compliance reviews. The photograph shows boxes and arrows. Auditors do not interview the named people or check employment records. The photo goes into a binder next to the broken SharePoint link."}, {"claim": "Security operations are governed by a mature suite of documented processes, approved by senior management and embedded in operational culture.", "failure_mode": "The on-call engineer followed the Incident Response Process exactly. Step 4 said \u0027lock out accounts using the Identity Management tool\u0027. The tool had been replaced. He locked out the recovery account instead. Step 5 said \u0027see Appendix B\u0027, which never existed.", "impact": "The post-incident review recommended updating all processes. The task was assigned to a disbanded team. It remained open for 8 months, then auto-closed for \u0027no activity\u0027. A new process was created to manage process updates. It referenced the missing Appendix B.", "name": "Processes are followed", "operational_reality": "The process documents live on a SharePoint site migrated twice, decommissioned, then resurrected as a read-only archive. The correct link is in a 2019 email whose attachment was blocked. So they use the old process, pointing to a shut down network drive.", "org_incentive": "Process documentation is evidence that a security programme exists. Evidence is what you show to enterprise clients. Whether the process describes current infrastructure is an operational matter, and the operational team is too busy following the old process to update it."}, {"claim": "Critical data is protected by automated daily backups, retained for 30 days, with offsite replication and end to end encryption.", "failure_mode": "Ransomware encrypted the file share at 14:13. The backup ran at 3:00 and produced a perfect encrypted copy, faithfully preserving the ransomware. Offsite replication at 4:00 created a second pristine encrypted copy. Both were retained for 30 days.", "impact": "The ransom was paid using company bitcoin. A post mortem identified 16 improvements, added to the security roadmap where they joined 13 from the previous incident and 9 from the one before that. The roadmap was approved by the committee that had no quorum.", "name": "Backups exist", "operational_reality": "Backup completion emails go to a distribution list that includes 3 departed employees and a shared mailbox no one monitors. One team member has a rule moving these emails to a folder labelled \u0027Do Not Read\u0027, which contains 47,000 unread messages.", "org_incentive": "Client questionnaires ask \u0027Do you perform daily backups?\u0027 The answer is yes, supported by a screenshot. The optional follow up \u0027Do you test restores?\u0027 appears in an \u0027advanced\u0027 section. Most clients skip it. Those who ask are told testing is quarterly, which is true if you count the test that failed 11 months ago."}, {"claim": "All staff with incident response responsibilities complete annual training and have access to the current Incident Response Plan.", "failure_mode": "When the alert fired, the team followed Section 7, \u0027Contact Network Operations Centre\u0027. The NOC had been outsourced in January. The emergency number was in Appendix C, which said \u0027see attached file\u0027, the same missing attachment from Appendix B. They spent 45 minutes searching for a file that never existed.", "impact": "The incident lasted 11 hours, with 3 teams following 3 different plans. The finance team restored from encrypted backups. The infrastructure team called the outsourced NOC. The security team notified a legal contact who had resigned. The post mortem concluded that communication was the main issue.", "name": "Staff know the plan", "operational_reality": "The Incident Response Plan is a PDF last updated 18 months ago. The infrastructure it describes was decommissioned 14 months ago. Staff complete training by clicking through a web module. The answers \u0027C, A, D, B, A\u0027 are shared in a WhatsApp group called \u0027Compliance is a Joke\u0027.", "org_incentive": "Training completion rates are reported to the board each quarter. The board sees 92\u201396% and says \u0027excellent\u0027. No one reports the accuracy of the plan, because that would require comparing it to the current environment. That comparison produced 412 discrepancies, filed and forgotten."}, {"claim": "The network follows a zero trust architecture with strict controls governing lateral movement between production, corporate, and guest zones.", "failure_mode": "The attacker joined the guest WiFi via a temporary rule from a 2022 vendor demo. The vendor left. The rule did not. From there, he pivoted to the domain controller using a rule added for the coffee machine to authenticate. The coffee machine had been mining cryptocurrency for 6 months.", "impact": "The attacker had full estate access for 6 days. After the incident, the diagram was updated to reflect reality and marked \u0027Internal use only. Draft not for external distribution\u0027. The Patch Committee requested a copy but could not receive it because the file exceeded the email attachment size limit.", "name": "Network segmentation is enforced", "operational_reality": "The network diagram was drawn by a consultant in 2021. The live network has 14 \u0027temporary\u0027 firewall rules added since then to fix incidents, unblock vendors, and let a coffee machine reach its config server. No one removes them because breaking something would need a CAB meeting.", "org_incentive": "The security team shows the consultant\u0027s diagram to auditors. The network team maintains the real rules and has never seen the diagram, stored on the decommissioned SharePoint. No process exists to compare them, because that would admit that temporary rules became permanent, triggering a governance review no one wants."}, {"claim": "Privileged accounts are subject to mandatory 90 day rotation, enforced through the Privileged Access Management platform with audit trails.", "failure_mode": "The compromised credential was 4 years old, belonging to a heating contractor\u0027s service account. The contract ended 18 months earlier. The account was renewed twice by an automated process responding to a shared mailbox, which generated new passwords stored in a text file on the same system later compromised.", "impact": "A forensic review found 212 accounts with credentials older than 2 years. High priority cases were remediated within 90 days. After the attacker had left. The rest were reviewed at the next annual planning cycle, where resource constraints were noted. The heating contractor\u0027s account was not on the list because the review excluded unmanaged accounts.", "name": "Credentials are rotated", "operational_reality": "The PAM platform manages 847 human accounts. It does not manage 340 service accounts created before 2020. Rotating them would require locating every service that uses them, which would require nonexistent documentation. So they are marked \u0027excluded from scope\u0027, and no one asks.", "org_incentive": "The PAM dashboard shows 100% compliance for managed accounts. Internal audit sees the dashboard. The auditor used to work on the network team and knows excluded accounts cannot be rotated without breaking production. The audit report says \u0027satisfactory\u0027."}, {"claim": "The Security Operations Centre provides 24/7 monitoring with automated alerting and a mean time to detect of under 4 hours for all critical assets.", "failure_mode": "The attacker operated freely in an acquired subsidiary for 63 days. The subsidiary was never added to monitoring scope because the form needed a signature from a director on gardening leave for 10 months. The SOC dashboard showed no alerts. The dashboard was technically correct.", "impact": "The board voted to monitor all critical assets. \u0027Critical\u0027 was defined as any system in the 2021 asset list that has a ticket in the CAB queue. The attacker used a different definition, which included the subsidiary\u0027s domain controller. The monitoring extension was descoped 6 weeks later due to budget constraints.", "name": "Monitoring is active", "operational_reality": "The SOC monitors an \u0027assets in scope\u0027 list last updated in 2021. It excludes cloud workloads after Q2 2022, 3 decommissioning datacentres, and any system ever connected to guest WiFi. Staff mark new systems as \u0027temporary\u0027 to avoid a 30 page onboarding form.", "org_incentive": "The SOC contract measures service level compliance against the defined asset list. Procurement renews annually, unaware the list is outdated. The SOC provider reports 99.99% availability against the list. The gap between list and actual estate is not a service level metric, so it does not exist."}, {"claim": "Backup integrity is validated through quarterly restore tests, with results documented and reviewed by the IT Security Committee.", "failure_mode": "When the required test finally ran, the backup agent had been silently failing for 5 months after a routine update. The agent reported success because the update changed logging from \u0027error\u0027 to \u0027info\u0027, and the monitoring script only looked for the word \u0027success\u0027. Backups were complete, encrypted, and unrestorable: the encryption key had been rotated and the new key never stored.", "impact": "Recovery took 4 days and cost \u20ac2.3 million. A new quarterly backup testing schedule was implemented immediately. It was identical to the previous one, except \u0027quarterly\u0027 was replaced with \u0027annual\u0027 to improve the team\u0027s ability to meet it. The IT Security Committee approved by email, not having met in person for 14 months.", "name": "Backups are tested", "operational_reality": "The last successful restore test was 11 months ago. Subsequent tests were deferred \u0027due to operational pressures\u0027, which is the standard phrase when the team is too busy but wants to keep the ticket open. The team jokes that the backups are \u0027probably fine\u0027, a phrase in 3 consecutive risk registers.", "org_incentive": "The audit requirement is to have a restore test schedule. The team has a schedule. The auditor checks the schedule and marks the control as compliant. The auditor does not attend the test, scheduled for a weekend. The team has learned that the schedule is the compliance artefact, not the test results."}, {"claim": "Third party access is governed by a formal process with time limited credentials, activity logging, and annual reviews by the business owner.", "failure_mode": "The attacker used credentials from a heating contractor whose engagement ended 18 months earlier. The credentials were renewed twice because a shared mailbox auto-replied \u0027approved, please send new credentials\u0027 to expiry notifications. The original business owner had left. His replacement had also left. The current occupant archived the review email without reading.", "impact": "After the breach, all vendor accounts were suspended. 17 belonged to expired contracts. 3 belonged to vendors no one could identify. One belonged to the building\u0027s previous tenant that moved out in 2020. The heating contractor\u0027s account was not suspended because the list came from the PAM dashboard, which excluded unmanaged accounts.", "name": "Vendor access is controlled", "operational_reality": "The annual review is an email to the \u0027business owner\u0027 listed in the vendor system. The owner has usually moved teams or left. Recipients have learned that replying \u0027still required\u0027 is the fastest way to close the email. No one ever replies \u0027revoke\u0027 because that might break something and create work.", "org_incentive": "Vendor offboarding requires coordination between procurement, IT security, and the business unit. This coordination is no one\u0027s primary job. Procurement says it is security\u0027s job. Security says it is procurement\u0027s job. The business unit says it is \u0027someone else\u0027s problem\u0027."}, {"claim": "All production changes are subject to formal impact assessment, rollback planning, and Change Advisory Board approval, with emergency changes reviewed retrospectively.", "failure_mode": "A change was raised as emergency at 23:43 because a security tool blocked transactions. The approving manager signed at 23:44 without reading, watching a film. It caused a 9-hour outage. Post incident review called it a \u0027process compliance success\u0027: the form was filed correctly, including a rollback plan from 2019, stored on decommissioned SharePoint drive.", "impact": "The outage cost \u20ac400,000 and affected 23,000 customers. The change manager received a commendation. The approving manager was asked to complete additional training. The Understanding Temporary Firewall Rules training, 94% completion rate among staff including 3 employees who left in 2022, was marked \u0027training complete\u0027.", "name": "Change management is followed", "operational_reality": "The emergency change procedure bypasses the CAB when \u0027waiting would cause unacceptable risk\u0027. Senior managers called at 11pm find most risks unacceptable. The retrospective review is an email to the same managers, who reply \u0027noted\u0027 and close the ticket. The rollback plan is typically \u0027we will fix it in the morning\u0027.", "org_incentive": "A correctly filed emergency change form, regardless of outcome, means the process was followed. The process exists to protect the organisation from unauthorised changes. The organisation is not the same as its systems, customers, or the heating contractor\u0027s shared mailbox. The change manager is measured on form completion rates, not outage hours. Bonus paid in full."}]</script>
